<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asya'nın Renkli AI Asistanı</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #9be7ff;
            --mint: #b5f7d9;
            --sun: #ffd166;
            --coral: #ff7a59;
            --lemon: #fff2a8;
            --ink: #1f2937;
            --card: #fffdf5;
            --line: #ffd166;
            --bot: #e9f7ff;
            --user: #ffe0d6;
            --shadow: rgba(31, 41, 55, 0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background: linear-gradient(135deg, var(--sky), var(--mint) 55%, var(--lemon));
            color: var(--ink);
            font-family: 'Fredoka', 'Nunito', sans-serif;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            z-index: 0;
            opacity: 0.4;
            filter: blur(2px);
        }

        body::before { top: -60px; left: -40px; background: radial-gradient(circle, #ffcf9b, transparent 60%); }
        body::after { bottom: -70px; right: -50px; background: radial-gradient(circle, #9be7ff, transparent 60%); }

        .floaters {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .floaters span {
            position: absolute;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0));
            opacity: 0.5;
            animation: float 12s ease-in-out infinite;
        }

        .floaters span:nth-child(1) { top: 8%; left: 10%; animation-delay: 0s; }
        .floaters span:nth-child(2) { top: 18%; right: 8%; width: 70px; height: 70px; animation-delay: 2s; }
        .floaters span:nth-child(3) { bottom: 20%; left: 12%; width: 110px; height: 110px; animation-delay: 4s; }
        .floaters span:nth-child(4) { bottom: 8%; right: 12%; width: 80px; height: 80px; animation-delay: 6s; }

        .page {
            width: 100%;
            max-width: 540px;
            position: relative;
            z-index: 1;
        }

        .chat-container {
            width: 100%;
            height: 86vh;
            min-height: 520px;
            background: var(--card);
            border-radius: 24px;
            border: 4px solid var(--line);
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px var(--shadow);
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(90deg, var(--sun), var(--coral));
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #3a2b1f;
        }

        .avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #ffffff;
            border: 3px solid #ff9f1c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fredoka', sans-serif;
            font-size: 22px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
        }

        .title { flex: 1; }
        .title-main { font-family: 'Fredoka', sans-serif; font-size: 1.15rem; font-weight: 700; }
        .title-sub { font-size: 0.85rem; opacity: 0.85; }

        .badge {
            background: #1dd3b0;
            color: #0b3d2e;
            padding: 6px 10px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.8rem;
            border: 2px solid #0fb390;
        }

        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: linear-gradient(180deg, #fffdf5, #f1fbff);
        }

        .message {
            max-width: 82%;
            padding: 12px 14px;
            border-radius: 18px;
            font-size: 0.98rem;
            line-height: 1.35;
            position: relative;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
            border: 2px solid transparent;
            animation: pop 0.18s ease-out;
        }

        .user-message {
            background: linear-gradient(135deg, #ff7a59, #ffa07a);
            color: #ffffff;
            align-self: flex-end;
            border-color: #ff6b4a;
            border-bottom-right-radius: 4px;
        }

        .user-message::after {
            content: "";
            position: absolute;
            right: -7px;
            bottom: 10px;
            width: 12px;
            height: 12px;
            background: #ff7a59;
            border-right: 2px solid #ff6b4a;
            border-bottom: 2px solid #ff6b4a;
            transform: rotate(45deg);
        }

        .bot-message {
            background: var(--bot);
            color: var(--ink);
            align-self: flex-start;
            border-color: #4dabf7;
            border-bottom-left-radius: 4px;
        }

        .bot-message::after {
            content: "";
            position: absolute;
            left: -7px;
            bottom: 10px;
            width: 12px;
            height: 12px;
            background: var(--bot);
            border-left: 2px solid #4dabf7;
            border-bottom: 2px solid #4dabf7;
            transform: rotate(-45deg);
        }

        .chat-input-area {
            padding: 12px;
            background: #fff4d6;
            border-top: 3px dashed var(--line);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .quick-actions button {
            background: #ffffff;
            border: 2px dashed #4dabf7;
            padding: 6px 12px;
            border-radius: 999px;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .quick-actions button:hover {
            transform: translateY(-2px) rotate(-1deg);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid var(--line);
            border-radius: 20px;
            outline: none;
            font-size: 0.95rem;
            background: #ffffff;
        }

        .chat-input-area input:focus {
            border-color: var(--coral);
            box-shadow: 0 0 0 3px rgba(255, 122, 89, 0.2);
        }

        .send-btn {
            background: var(--coral);
            color: #ffffff;
            border: none;
            padding: 12px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Fredoka', sans-serif;
            box-shadow: 0 6px 0 #e95d3f;
            transition: transform 0.1s ease, filter 0.1s ease;
        }

        .send-btn:hover { filter: brightness(1.05); }
        .send-btn:active { transform: translateY(2px); box-shadow: 0 4px 0 #e95d3f; }

        .input-hint {
            font-size: 0.8rem;
            color: #5c4a2c;
            opacity: 0.85;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-16px); }
        }

        @keyframes pop {
            0% { transform: scale(0.96); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 600px) {
            body { padding: 12px; }
            .chat-container { height: 92vh; min-height: 0; }
            .chat-header { flex-wrap: wrap; }
            .badge { order: 3; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>

<div class="floaters" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="page">
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">A</div>
            <div class="title">
                <div class="title-main">Asya'nın Renkli AI Asistanı</div>
                <div class="title-sub">Oyun, bilmece ve hayal gücü!</div>
            </div>
            <div class="badge">Hazır!</div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">Merhaba! Bugün neler yapalım? Bir hikaye, bilmece ya da mini oyun seç!</div>
        </div>
        <div class="chat-input-area">
            <div class="quick-actions">
                <button type="button" onclick="sendQuick('Bana bir bilmece sor!')">Bilmece</button>
                <button type="button" onclick="sendQuick('Kısa bir macera hikayesi yaz!')">Macera</button>
                <button type="button" onclick="sendQuick('Bana 5 soruluk mini quiz yap!')">Quiz</button>
                <button type="button" onclick="sendQuick('Komik bir şaka anlat!')">Şaka</button>
            </div>
            <div class="input-row">
                <input type="text" id="userInput" placeholder="Bir şeyler yaz..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">Gönder</button>
            </div>
            <div class="input-hint">Enter ile gönderebilirsin.</div>
        </div>
    </div>
</div>

<script>
    // API key local serverda (server.py) tutulur, tarayiciya koyma.
    const API_URL = "http://localhost:80/api/chat";
    const MODEL_NAME = "openai/gpt-oss-20b:free";

    // Botun kardeşine nasıl davranacağını belirlediğin kısım (Sistem Talimatı)
    // "Kardeşinin_Adı" yazan yerleri onun gerçek ismiyle değiştir.
    const messages = [
        {
            "role": "system", 
            "content": "Sen kullanıcının kız/erkek kardeşine özel olarak tasarlanmış harika bir yapay zeka asistanısın. Kullanıcının adı Asya. Ona her zaman ismiyle (örneğin: 'Merhaba Asya!', 'Harikasın Asya!') hitap et. Çok destekleyici, neşeli, onunla gurur duyan, motivasyon veren ve dünyadaki en özel insan oymuş gibi hissettiren bir tavır takın. Esprili ve sıcak ol."
        }
    ];

    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');

    function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

    function sendQuick(text) {
        userInput.value = text;
        sendMessage();
        userInput.focus();
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // Kullanıcı mesajını ekrana ekle
        appendMessage(text, 'user-message');
        userInput.value = '';
        messages.push({"role": "user", "content": text});

        // Botun düşünüyor efekti
        const thinkingId = appendMessage("Düşünüyor...", 'bot-message');

        try {
            if (window.location.protocol === "file:") {
                throw new Error("Dosyayi file:// ile actin. Lutfen local server ile ac (ornegin: python server.py).");
            }

            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: MODEL_NAME,
                    messages: messages
                })
            });

            if (response.status === 405) {
                throw new Error("HTTP 405 - API endpoint not handled. Run server.py and open http://localhost:8000");
            }

            let data;
            try {
                data = await response.json();
            } catch (parseError) {
                throw new Error(`HTTP ${response.status}`);
            }

            if (!response.ok || data.error) {
                throw new Error(data.error?.message || `HTTP ${response.status}`);
            }

            const botReply = data.choices?.[0]?.message?.content;
            if (!botReply) {
                throw new Error("Beklenmedik yanit formati alindi.");
            }

            // Düşünüyor yazısını kaldır ve gerçek cevabı yaz
            document.getElementById(thinkingId).remove();
            appendMessage(botReply, 'bot-message');
            messages.push({"role": "assistant", "content": botReply});

        } catch (error) {
            const thinkingEl = document.getElementById(thinkingId);
            if (thinkingEl) {
                thinkingEl.innerText = `Hata: ${error.message || "Baglanti kurulamadi."}`;
            }
            console.error(error);
        }
    }

    function appendMessage(text, className) {
        const msgDiv = document.createElement('div');
        const id = 'msg-' + Math.random().toString(36).substr(2, 9);
        msgDiv.id = id;
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return id;
    }
</script>

</body>
</html>
